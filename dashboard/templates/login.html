<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakul Focus — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161921;
      --border:  #232838;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --blue:    #4f8ef7;
      --green:   #34d399;
      --red:     #f87171;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      font-size: 2.4rem;
      color: var(--blue);
      display: block;
      margin-bottom: 10px;
    }

    .logo-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus {
      border-color: var(--blue);
    }

    .btn-login {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-login:hover { opacity: 0.88; }

    .error-msg {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 12px;
      padding: 9px 12px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <i class="ti ti-shield-lock logo-icon"></i>
      <div class="logo-title">Nakul Focus</div>
      <div class="logo-sub">Personal dashboard</div>
    </div>

    {% if error %}
    <div class="error-msg"><i class="ti ti-alert-circle"></i> Wrong password. Try again.</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          type="password"
          name="password"
          id="pw"
          placeholder="Enter your password"
          autofocus
          autocomplete="current-password"
        >
      </div>
      <button class="btn-login" type="submit">Unlock Dashboard</button>
    </form>
  </div>
</body>
</html>
